name: Manual Build EXE

on:
  workflow_dispatch: # Cho phép bạn bấm nút "Run workflow" thủ công trên GitHub

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install pyinstaller -r requirements.txt
          CameraAI
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "CameraAI" mainwindow.py
          
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Production-EXE
          path: dist/Final_App.exe
